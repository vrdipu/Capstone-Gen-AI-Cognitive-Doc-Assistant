apiVersion: v1
kind: ConfigMap
metadata:
  name: genai-config
  namespace: genai-assistant
data:
  APP_ENV: "production"
  DEBUG: "False"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LLM_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-2.5-flash-lite"
  GEMINI_API_BASE_URL: "https://generativelanguage.googleapis.com"
  GEMINI_API_VERSION: "v1"
  GEMINI_GENERATION_MAX_RETRIES: "3"
  EMBEDDING_PROVIDER: "gemini"
  GEMINI_EMBEDDING_MODEL: "gemini-embedding-001"
  GEMINI_EMBEDDING_API_VERSION: "v1beta"
  GEMINI_EMBEDDING_BATCH_SIZE: "8"
  GEMINI_EMBEDDING_BATCH_DELAY_SECONDS: "2"
  GEMINI_EMBEDDING_MAX_RETRIES: "6"
  LLM_TIMEOUT_SECONDS: "180"
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  OLLAMA_CHAT_MODEL: "llama3.2:3b"
  OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
  CHROMA_PERSIST_DIR: "/app/data/vectorstore"
  UPLOAD_DIR: "/app/data/uploads"
  CHROMA_COLLECTION_NAME: "documents"
  MAX_FILE_SIZE_MB: "10"
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "150"
  TOP_K_RESULTS: "3"
  MAX_GRAPH_RETRIES: "3"
