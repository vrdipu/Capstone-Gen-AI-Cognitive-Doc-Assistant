apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-frontend
  namespace: genai-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-frontend
  template:
    metadata:
      labels:
        app: genai-frontend
    spec:
      containers:
        - name: frontend
          image: dirajan/capstone-agentic-rag-frontend:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: http://api:8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: genai-assistant
spec:
  type: NodePort
  selector:
    app: genai-frontend
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501
