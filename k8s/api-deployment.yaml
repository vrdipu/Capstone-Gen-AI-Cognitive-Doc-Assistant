apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-api
  namespace: genai-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-api
  template:
    metadata:
      labels:
        app: genai-api
    spec:
      containers:
        - name: api
          image: capstone-agentic-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: genai-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: genai-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: genai-assistant
spec:
  selector:
    app: genai-api
  ports:
    - port: 8000
      targetPort: 8000
