services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: capstone-agentic-rag:latest
    container_name: capstone-agentic-rag-api
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_API_VERSION: ${GEMINI_API_VERSION:-v1}
      GEMINI_GENERATION_MAX_RETRIES: ${GEMINI_GENERATION_MAX_RETRIES:-3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_API_VERSION: ${GEMINI_EMBEDDING_API_VERSION:-v1beta}
      GEMINI_EMBEDDING_BATCH_SIZE: ${GEMINI_EMBEDDING_BATCH_SIZE:-8}
      GEMINI_EMBEDDING_BATCH_DELAY_SECONDS: ${GEMINI_EMBEDDING_BATCH_DELAY_SECONDS:-2}
      GEMINI_EMBEDDING_MAX_RETRIES: ${GEMINI_EMBEDDING_MAX_RETRIES:-6}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      CHROMA_PERSIST_DIR: /app/data/vectorstore
      UPLOAD_DIR: /app/data/uploads
      DEBUG: "False"
      PYTHONWARNINGS: "ignore:The default value of `allowed_objects` will change in a future version"
      ANONYMIZED_TELEMETRY: "False"
      CHROMA_TELEMETRY: "False"
      MAX_GRAPH_RETRIES: ${MAX_GRAPH_RETRIES:-3}
    volumes:
      - api-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: capstone-agentic-rag-frontend:latest
    container_name: capstone-agentic-rag-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
